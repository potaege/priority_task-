<div id="modal-overlay" style="display:none">
    <div class="modal">

        <div class="modal-header">
            <div class="modal-header-left">
                <span class="modal-dot" id="modal-dot"></span>
                <span class="modal-title">รายละเอียด task</span>
            </div>
            <button class="modal-close" id="btn-close-modal">✕</button>
        </div>

        <div class="modal-body">
            <div class="modal-row">
                <span class="modal-label">ID</span>
                <span class="modal-value" id="modal-id"></span>
            </div>
            <div class="modal-row">
                <span class="modal-label">ชื่อ task</span>
                <span class="modal-value" id="modal-name"></span>
            </div>
            <div class="modal-row">
                <span class="modal-label">รายละเอียด</span>
                <span class="modal-value" id="modal-details"></span>
            </div>
            <div class="modal-row">
                <span class="modal-label">Priority</span>
                <span class="modal-badge" id="modal-priority"></span>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn-modal-edit" id="btn-edit-task">แก้ไข task</button>
            <div class="modal-actions-row">
                <button class="btn-modal-cancel" id="btn-cancel-task">ยกเลิก task</button>
                <button class="btn-modal-done" id="btn-done-task">เสร็จสิ้น</button>
            </div>
        </div>

    </div>
</div>
