<div id="edit-modal-overlay" style="display:none">
    <div class="modal">

        <div class="modal-header">
            <div class="modal-header-left">
                <span class="modal-title">แก้ไข task</span>
            </div>
            <button class="modal-close" id="btn-close-edit-modal">✕</button>
        </div>

        <div class="modal-body">
            <div class="modal-row" style="flex-direction: column; gap: 6px;">
                <span class="modal-label">ชื่อ task</span>
                <input type="text" id="edit-name" class="edit-input" placeholder="ชื่อ task">
            </div>
            <div class="modal-row" style="flex-direction: column; gap: 6px;">
                <span class="modal-label">รายละเอียด</span>
                <textarea id="edit-details" class="edit-input edit-textarea" placeholder="รายละเอียด"></textarea>
            </div>
            <div class="modal-row" style="flex-direction: column; gap: 6px;">
                <span class="modal-label">Priority</span>
                <div class="priority-selector">
                    <button class="priority-btn" data-value="low">Low</button>
                    <button class="priority-btn" data-value="medium">Medium</button>
                    <button class="priority-btn" data-value="high">High</button>
                </div>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn-modal-edit" id="btn-save-task">บันทึก</button>
        </div>

    </div>
</div>
